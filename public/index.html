<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TaskFlow</title>
    <link rel="stylesheet" href="/styles.css" />
  </head> 
  <body>
    <main class="app-shell">
      <section class="auth-view" id="authView">
        <div class="auth-panel">
          <div>
            <p class="eyebrow">TaskFlow</p>
            <h1>Plan work without losing the thread.</h1>
            <p class="intro">
              Sign in to create, update, filter, and track tasks across your
              own workspace.
            </p>
          </div>

          <form class="auth-form" id="authForm">
            <div class="segmented-control" role="tablist" aria-label="Auth mode">
              <button class="segment is-active" type="button" data-auth-mode="login">
                Sign in
              </button>
              <button class="segment" type="button" data-auth-mode="register">
                Register
              </button>
            </div>

            <label class="field register-only" for="nameInput">
              <span>Name</span>
              <input id="nameInput" name="name" autocomplete="name" />
            </label>

            <label class="field" for="emailInput">
              <span>Email</span>
              <input
                id="emailInput"
                name="email"
                type="email"
                autocomplete="email"
                required
              />
            </label>

            <label class="field" for="passwordInput">
              <span>Password</span>
              <input
                id="passwordInput"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                minlength="8"
              />
            </label>

            <p class="form-error" id="authError" role="alert"></p>
            <button class="primary-button" type="submit" id="authSubmit">
              Sign in
            </button>
          </form>
        </div>
      </section>

      <section class="workspace is-hidden" id="workspaceView">
        <header class="topbar">
          <div>
            <p class="eyebrow">TaskFlow</p>
            <h1>Tasks</h1>
          </div>
          <div class="topbar-actions">
            <span class="user-pill" id="userLabel"></span>
            <button class="icon-button" id="logoutButton" type="button" title="Sign out">
              <span aria-hidden="true">↪</span>
              <span class="sr-only">Sign out</span>
            </button>
          </div>
        </header>

        <section class="dashboard-grid">
          <aside class="task-editor">
            <div class="panel-heading">
              <h2 id="editorTitle">New task</h2>
              <button class="ghost-button is-hidden" id="cancelEditButton" type="button">
                Cancel edit
              </button>
            </div>

            <form id="taskForm" class="task-form">
              <label class="field" for="taskTitle">
                <span>Title</span>
                <input id="taskTitle" name="title" maxlength="120" required />
              </label>

              <label class="field" for="taskDescription">
                <span>Description</span>
                <textarea id="taskDescription" name="description" rows="5"></textarea>
              </label>

              <div class="field-row">
                <label class="field" for="taskDueDate">
                  <span>Due date</span>
                  <input id="taskDueDate" name="dueDate" type="date" />
                </label>

                <label class="field" for="taskPriority">
                  <span>Priority</span>
                  <select id="taskPriority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                  </select>
                </label>
              </div>

              <label class="field" for="taskStatus">
                <span>Status</span>
                <select id="taskStatus" name="status">
                  <option value="todo">To do</option>
                  <option value="in-progress">In progress</option>
                  <option value="done">Done</option>
                </select>
              </label>

              <p class="form-error" id="taskError" role="alert"></p>
              <button class="primary-button" type="submit" id="taskSubmit">
                Create task
              </button>
            </form>
          </aside>

          <section class="task-board">
            <div class="summary-strip" id="summaryStrip"></div>

            <div class="filters">
              <div class="segmented-control" aria-label="Task status filter">
                <button class="segment is-active" type="button" data-filter="all">
                  All
                </button>
                <button class="segment" type="button" data-filter="todo">
                  To do
                </button>
                <button class="segment" type="button" data-filter="in-progress">
                  In progress
                </button>
                <button class="segment" type="button" data-filter="done">
                  Done
                </button>
              </div>

              <label class="search-field" for="taskSearch">
                <span class="sr-only">Search tasks</span>
                <input id="taskSearch" placeholder="Search tasks" />
              </label>
            </div>

            <div class="task-list" id="taskList"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
